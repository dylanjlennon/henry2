<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Henry — Buncombe County Property Research</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1a202c;
      --muted: #718096;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #059669;
      --error: #dc2626;
      --warn: #d97706;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-lg: 0 4px 16px rgba(0,0,0,.08);
    }
    body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }

    /* ── HEADER ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-weight: 700; font-size: 18px; letter-spacing: -.4px; color: var(--text); text-decoration: none; }
    .logo em { color: var(--accent); font-style: normal; }
    .tagline { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: .2px; }

    /* ── HERO ── */
    .hero { max-width: 600px; margin: 0 auto; padding: 72px 24px 40px; text-align: center; }
    .hero h1 { font-size: 32px; font-weight: 700; letter-spacing: -.6px; line-height: 1.2; margin-bottom: 12px; }
    .hero h1 span { color: var(--accent); }
    .hero p { color: var(--muted); font-size: 15px; max-width: 420px; margin: 0 auto 36px; }

    /* ── SEARCH ── */
    .search-wrap { max-width: 600px; margin: 0 auto; padding: 0 24px; }
    .search-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); overflow: visible; padding: 6px 6px 6px 18px; display: flex; align-items: center; gap: 8px; transition: border-color .15s, box-shadow .15s; }
    .search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1), var(--shadow-lg); }
    #address-input { flex: 1; border: none; outline: none; font-size: 16px; font-family: inherit; color: var(--text); background: transparent; padding: 8px 0; min-width: 0; }
    #address-input::placeholder { color: #a0aec0; }
    #search-btn { flex-shrink: 0; height: 44px; padding: 0 22px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s, opacity .15s; white-space: nowrap; }
    #search-btn:hover { background: var(--accent-hover); }
    #search-btn:disabled { opacity: .55; cursor: not-allowed; }
    .search-hint { font-size: 12px; color: var(--muted); margin-top: 10px; text-align: center; }

    #error-msg { display: none; background: #fef2f2; border: 1px solid #fecaca; color: var(--error); border-radius: 8px; padding: 11px 16px; font-size: 14px; margin-top: 12px; }

    /* ── BATCH SECTION ── */
    .batch-section { max-width: 600px; margin: 28px auto 0; padding: 0 24px; }
    .batch-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; user-select: none; width: fit-content; }
    .batch-toggle:hover { color: var(--text); }
    .batch-toggle svg { transition: transform .2s; }
    .batch-toggle.open svg { transform: rotate(90deg); }
    .batch-body { display: none; margin-top: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .batch-body.open { display: block; }
    .batch-body label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 8px; }
    #batch-input { width: 100%; min-height: 100px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'Inter', monospace; color: var(--text); padding: 10px 12px; resize: vertical; outline: none; transition: border-color .15s; }
    #batch-input:focus { border-color: var(--accent); }
    #batch-btn { margin-top: 10px; height: 38px; padding: 0 18px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s; }
    #batch-btn:hover { background: var(--accent-hover); }
    #batch-status { margin-top: 10px; font-size: 13px; color: var(--muted); }

    /* ── HISTORY ── */
    .history-section { max-width: 900px; margin: 48px auto 80px; padding: 0 24px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-weight: 600; font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; cursor: pointer; transition: box-shadow .15s, border-color .15s; text-decoration: none; display: block; }
    .history-card:hover { box-shadow: var(--shadow-lg); border-color: #c7d7f8; }
    .hc-address { font-weight: 600; font-size: 14px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
    .hc-pin { font-size: 12px; color: var(--muted); font-family: 'SF Mono', 'Fira Code', monospace; margin-bottom: 10px; }
    .hc-meta { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--muted); }
    .hc-status { display: flex; align-items: center; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    .dot.failed { background: var(--error); }
    .dot.running { background: var(--warn); animation: pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .hc-docs { font-weight: 500; color: var(--text); }
    .empty-state { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; grid-column: 1/-1; }

    .pac-container { z-index: 9999; font-family: 'Inter', sans-serif; font-size: 14px; border-radius: 8px; }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/app.html">Henry<em>.</em></a>
  <span class="tagline">Buncombe County, NC</span>
</header>

<div class="hero">
  <h1>Property research,<br><span>done in minutes.</span></h1>
  <p>Type any Buncombe County address or PIN. Henry pulls every public record and delivers a complete property intelligence report.</p>
</div>

<div class="search-wrap">
  <div class="search-box">
    <input id="address-input" type="text" placeholder="546 Old Haw Creek Rd, Asheville, NC" autocomplete="off" />
    <button id="search-btn">Research →</button>
  </div>
  <p class="search-hint">Street addresses and 15-digit PINs accepted.</p>
  <div id="error-msg"></div>
</div>

<div class="batch-section">
  <div class="batch-toggle" id="batch-toggle">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2.5L8 6L4.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Batch research multiple addresses
  </div>
  <div class="batch-body" id="batch-body">
    <label>One address per line</label>
    <textarea id="batch-input" placeholder="14 Marne Road&#10;22 Kenilwood Place&#10;351 Windsor Road&#10;193 Pennsylvania Avenue&#10;21 Kylie Grace Lane&#10;1 Sunset Hills Drive"></textarea>
    <button id="batch-btn">Research all →</button>
    <div id="batch-status"></div>
  </div>
</div>

<div class="history-section">
  <div class="section-header">
    <span class="section-title">Recent Searches</span>
  </div>
  <div class="history-grid" id="history-grid">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const addressInput = document.getElementById('address-input');
  const searchBtn    = document.getElementById('search-btn');
  const errorMsg     = document.getElementById('error-msg');
  const historyGrid  = document.getElementById('history-grid');
  const batchToggle  = document.getElementById('batch-toggle');
  const batchBody    = document.getElementById('batch-body');
  const batchInput   = document.getElementById('batch-input');
  const batchBtn     = document.getElementById('batch-btn');
  const batchStatus  = document.getElementById('batch-status');

  // ── Search ──────────────────────────────────────────────────────────────────
  searchBtn.addEventListener('click', startSearch);
  addressInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startSearch(); });

  async function startSearch() {
    const address = addressInput.value.trim();
    if (!address) { showError('Please enter an address or PIN.'); return; }
    errorMsg.style.display = 'none';
    searchBtn.disabled = true;
    searchBtn.textContent = 'Resolving…';
    try {
      const resp = await fetch('/api/web/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address }),
      });
      const data = await resp.json();
      if (!resp.ok) { showError(data.error || 'Could not resolve address.'); return; }
      window.location.href = `/report.html?run=${encodeURIComponent(data.runId)}`;
    } catch {
      showError('Network error — please try again.');
    } finally {
      searchBtn.disabled = false;
      searchBtn.textContent = 'Research →';
    }
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  // ── Batch ──────────────────────────────────────────────────────────────────
  batchToggle.addEventListener('click', () => {
    batchToggle.classList.toggle('open');
    batchBody.classList.toggle('open');
  });

  batchBtn.addEventListener('click', async () => {
    const lines = batchInput.value.split('\n').map(s => s.trim()).filter(Boolean);
    if (!lines.length) return;
    batchBtn.disabled = true;
    batchStatus.textContent = `Queuing ${lines.length} address(es)…`;

    let done = 0;
    for (const address of lines) {
      try {
        const resp = await fetch('/api/web/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ address }),
        });
        const data = await resp.json();
        if (resp.ok) {
          done++;
          batchStatus.textContent = `Queued ${done}/${lines.length}: ${data.address ?? address}`;
        } else {
          batchStatus.textContent = `⚠ ${address}: ${data.error}`;
        }
      } catch {
        batchStatus.textContent = `⚠ Network error on: ${address}`;
      }
      // Throttle to avoid rate limit
      if (done < lines.length) await new Promise(r => setTimeout(r, 1500));
    }
    batchStatus.textContent = `✓ Queued ${done} searches. Results will appear below.`;
    batchBtn.disabled = false;
    setTimeout(loadHistory, 2000);
  });

  // ── History ────────────────────────────────────────────────────────────────
  async function loadHistory() {
    try {
      const resp = await fetch('/api/web/history?limit=24');
      if (!resp.ok) return;
      const { runs } = await resp.json();
      renderHistory(runs);
    } catch { /* silent */ }
  }

  function renderHistory(runs) {
    if (!runs || !runs.length) {
      historyGrid.innerHTML = '<div class="empty-state">No searches yet — try an address above.</div>';
      return;
    }
    historyGrid.innerHTML = runs.map(r => {
      const isRunning = r.status === 'running';
      const isFailed = r.status === 'failed';
      const dotClass = isRunning ? 'dot running' : isFailed ? 'dot failed' : 'dot';
      const statusText = isRunning ? 'Researching…' : isFailed ? 'Failed' : 'Complete';
      const docs = r.artifactsProduced ? `${r.artifactsProduced} docs` : '';
      const when = formatWhen(r.startedAt);
      return `<a class="history-card" href="/report.html?run=${esc(r.runId)}">
        <div class="hc-address">${esc(r.address || r.pin)}</div>
        <div class="hc-pin">${esc(r.pin)}</div>
        <div class="hc-meta">
          <span class="hc-status"><span class="${dotClass}"></span>${statusText}</span>
          <span>${docs ? `<strong class="hc-docs">${esc(docs)}</strong> · ` : ''}${esc(when)}</span>
        </div>
      </a>`;
    }).join('');
  }

  function formatWhen(iso) {
    try {
      const d = new Date(iso);
      const now = new Date();
      const diffMs = now - d;
      const diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 1) return 'just now';
      if (diffMin < 60) return `${diffMin}m ago`;
      const diffH = Math.floor(diffMin / 60);
      if (diffH < 24) return `${diffH}h ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    } catch { return ''; }
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Google Places ──────────────────────────────────────────────────────────
  function initPlaces() {
    if (!window.google?.maps?.places) return;
    const ac = new google.maps.places.Autocomplete(addressInput, {
      types: ['address'],
      componentRestrictions: { country: 'us' },
      bounds: new google.maps.LatLngBounds(
        new google.maps.LatLng(35.32, -82.75),
        new google.maps.LatLng(35.73, -82.22)
      ),
      strictBounds: false,
      fields: ['formatted_address'],
    });
    ac.addListener('place_changed', () => {
      const p = ac.getPlace();
      if (p.formatted_address) addressInput.value = p.formatted_address;
    });
  }
  window.__henry_init_places__ = initPlaces;

  fetch('/api/web/config').then(r => r.json()).then(cfg => {
    if (cfg?.googlePlacesKey) {
      const s = document.createElement('script');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(cfg.googlePlacesKey)}&libraries=places&callback=__henry_init_places__`;
      s.async = true; s.defer = true;
      document.body.appendChild(s);
    }
  }).catch(() => {});

  // ── Init ───────────────────────────────────────────────────────────────────
  loadHistory();
  // Poll for running searches
  setInterval(() => {
    const cards = document.querySelectorAll('.dot.running');
    if (cards.length) loadHistory();
  }, 5000);

})();
</script>
</body>
</html>
